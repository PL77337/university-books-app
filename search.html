<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szukaj znajomych</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <a href="index.html" class="btn btn-secondary mb-3">Powrót</a>
    <h3>Szukaj znajomych</h3>
    <div class="input-group mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Wpisz nazwę użytkownika...">
        <button onclick="searchUsers()" class="btn btn-primary">Szukaj</button>
    </div>
    <div id="results" class="list-group"></div>
</div>

<script>
    const dbUrl = 'https://ekfjvbncqmoioxmfbrer.supabase.co';
    const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZmp2Ym5jcW1vaW94bWZicmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA4NjQsImV4cCI6MjA5Mzk3Njg2NH0.JHSrgWWkenp8rg2di9TmvIp46XuOASWPs8Gx1rC52Zs';
    const db = supabase.createClient(dbUrl, dbKey);

    async function searchUsers() {
        const query = document.getElementById('searchInput').value;
        const { data: users } = await db.from('profiles').select('*').ilike('username', `%${query}%`);
        
        const container = document.getElementById('results');
        container.innerHTML = users.map(u => `
            <a href="profile.html?id=${u.id}" class="list-group-item list-group-item-action d-flex align-items-center">
                <img src="${u.avatar_url}" class="rounded-circle me-3" style="width: 40px; height: 40px;">
                ${u.username || 'Anonim'}
            </a>
        `).join('');
    }
</script>
</body>
</html>
