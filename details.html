<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczegóły Książki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <a href="index.html" class="btn btn-secondary mb-3">&larr; Powrót do listy</a>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 id="bookTitle" class="card-title">Ładowanie...</h2>
            <h5 id="bookAuthor" class="card-subtitle mb-2 text-muted"></h5>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h4>Opinie i komentarze</h4>
            
            <div class="mb-3 d-flex mt-3">
                <input type="text" id="commentInput" class="form-control me-2" placeholder="Napisz swoją opinię..." required>
                <button onclick="addComment()" class="btn btn-success">Dodaj</button>
            </div>

            <ul id="commentsContainer" class="list-group list-group-flush mt-4">
                <li class="list-group-item text-muted">Ładowanie komentarzy...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // Изменил названия переменных, чтобы 100% избежать ошибок
    const dbUrl = 'https://ekfjvbncqmoioxmfbrer.supabase.co';
    const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZmp2Ym5jcW1vaW94bWZicmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA4NjQsImV4cCI6MjA5Mzk3Njg2NH0.JHSrgWWkenp8rg2di9TmvIp46XuOASWPs8Gx1rC52Zs';
    const db = supabase.createClient(dbUrl, dbKey);

    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('id');

    if (!bookId) {
        document.body.innerHTML = '<div class="container mt-5"><h3>Błąd: Nie wybrano książki. <a href="index.html">Powrót</a></h3></div>';
    } else {
        loadBookDetails();
        loadComments();
    }

    async function loadBookDetails() {
        const { data, error } = await db.from('books').select('*').eq('id', bookId).single();
        if (data) {
            document.getElementById('bookTitle').innerText = data.title;
            document.getElementById('bookAuthor').innerText = data.author;
        }
    }

    async function loadComments() {
        const { data, error } = await db.from('comments').select('*').eq('book_id', bookId).order('created_at', { ascending: false });
        const container = document.getElementById('commentsContainer');
        container.innerHTML = '';

        if (data && data.length > 0) {
            data.forEach(comment => {
                const li = document.createElement('li');
                li.className = 'list-group-item';
                li.innerText = comment.text;
                container.appendChild(li);
            });
        } else {
            container.innerHTML = '<li class="list-group-item">Brak opinii. Bądź pierwszy!</li>';
        }
    }

    async function addComment() {
        const text = document.getElementById('commentInput').value.trim();
        if (!text) return alert('Wpisz komentarz!');

        const { error } = await db.from('comments').insert([{ book_id: bookId, text: text }]);
        if (!error) {
            document.getElementById('commentInput').value = '';
            loadComments();
        } else {
            alert('Wystąpił błąd. Sprawdź konsolę (F12).');
            console.error(error);
        }
    }
</script>

</body>
</html>
