<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie / Rejestracja</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4" id="authTitle">Zaloguj się</h3>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Hasło">
                    </div>
                    <button onclick="handleAuth()" class="btn btn-primary w-100 mb-2" id="mainBtn">Zaloguj się</button>
                    <button onclick="toggleMode()" class="btn btn-link w-100" id="toggleBtn">Nie masz konta? Zarejestruj się</button>
                    <a href="index.html" class="btn btn-outline-secondary w-100 mt-3">Powrót</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const dbUrl = 'https://ekfjvbncqmoioxmfbrer.supabase.co';
    const dbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZmp2Ym5jcW1vaW94bWZicmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA4NjQsImV4cCI6MjA5Mzk3Njg2NH0.JHSrgWWkenp8rg2di9TmvIp46XuOASWPs8Gx1rC52Zs';
    const db = supabase.createClient(dbUrl, dbKey);

    let isSignUp = false;

    function toggleMode() {
        isSignUp = !isSignUp;
        document.getElementById('authTitle').innerText = isSignUp ? 'Zarejestruj się' : 'Zaloguj się';
        document.getElementById('mainBtn').innerText = isSignUp ? 'Stwórz konto' : 'Zaloguj się';
        document.getElementById('toggleBtn').innerText = isSignUp ? 'Masz już konto? Zaloguj się' : 'Nie masz konta? Zarejestruj się';
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (isSignUp) {
            const { error } = await db.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('Konto stworzone! Możesz się zalogować.');
        } else {
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
