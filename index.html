<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Książek</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div id="authArea" class="text-end mb-3">
        <li class="list-inline-item text-muted">Sprawdzanie statusu...</li>
    </div>

    <h1 class="mb-4 text-center">Mój Katalog Książek</h1>
    
    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <h5 class="card-title">Dodaj nową książkę</h5>
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="titleInput" class="form-control" placeholder="Tytuł książki" required>
                </div>
                <div class="col-md-5">
                    <input type="text" id="authorInput" class="form-control" placeholder="Autor" required>
                </div>
                <div class="col-md-2">
                    <button onclick="addBook()" class="btn btn-primary w-100">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Lista książek</h5>
            <ul id="booksContainer" class="list-group list-group-flush">
                <li class="list-group-item text-muted">Ładowanie...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ekfjvbncqmoioxmfbrer.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZmp2Ym5jcW1vaW94bWZicmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA4NjQsImV4cCI6MjA5Mzk3Njg2NH0.JHSrgWWkenp8rg2di9TmvIp46XuOASWPs8Gx1rC52Zs';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // Функция проверки пользователя
    async function checkUser() {
        const { data: { user } } = await db.auth.getUser();
        const authArea = document.getElementById('authArea');
        
        if (user) {
            authArea.innerHTML = `
                <span class="me-2 text-dark font-weight-bold">Witaj, <strong>${user.email}</strong></span>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger">Wyloguj</button>
            `;
            return user;
        } else {
            authArea.innerHTML = `
                <a href="auth.html" class="btn btn-sm btn-success">Zaloguj się / Rejestracja</a>
            `;
            return null;
        }
    }

    // Функция выхода
    async function logout() {
        await db.auth.signOut();
        window.location.reload();
    }

    async function fetchBooks() {
        const user = await checkUser();
        const { data, error } = await db.from('books').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('booksContainer');
        container.innerHTML = ''; 

        if (error) { 
            container.innerHTML = '<li class="list-group-item text-danger">Błąd ładowania данных.</li>'; 
            return; 
        }
        
        if (data.length === 0) { 
            container.innerHTML = '<li class="list-group-item">Brak książek w bazie.</li>'; 
            return; 
        }

        data.forEach(book => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';
            
            // Кнопка удаления доступна только авторизованным пользователям
            const deleteBtn = user ? `<button onclick="deleteBook(${book.id})" class="btn btn-sm btn-outline-danger">Usuń</button>` : '';

            li.innerHTML = `
                <div>
                    <strong>${book.title}</strong> <span class="text-muted ms-2">${book.author}</span>
                </div>
                <div>
                    <a href="details.html?id=${book.id}" class="btn btn-sm btn-outline-info me-2">Szczegóły</a>
                    ${deleteBtn}
                </div>
            `;
            container.appendChild(li);
        });
    }

    async function addBook() {
        const user = await checkUser();
        if (!user) {
            alert('Musisz być zalogowany, aby dodać książkę!');
            return;
        }

        const title = document.getElementById('titleInput').value.trim();
        const author = document.getElementById('authorInput').value.trim();
        if (!title || !author) return alert('Proszę wypełnić wszystkie pola!');

        const { error } = await db.from('books').insert([{ title, author }]);
        if (!error) {
            document.getElementById('titleInput').value = '';
            document.getElementById('authorInput').value = '';
            fetchBooks();
        } else {
            alert('Wystąpił błąd podczas dodawania.');
        }
    }

    async function deleteBook(id) {
        const user = await checkUser();
        if (!user) return alert('Brak uprawnień!');

        if (!confirm('Na pewno chcesz usunąć tę książkę?')) return;
        const { error } = await db.from('books').delete().eq('id', id);
        if (!error) {
            fetchBooks();
        } else {
            console.error('Delete error:', error);
        }
    }

    fetchBooks();
</script>

</body>
</html>
