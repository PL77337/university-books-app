<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Książek</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div id="authArea" class="text-end mb-3">
        <span class="text-muted">Ładowanie statusu...</span>
    </div>

    <h1 class="mb-4 text-center">Mój Katalog Książek</h1>
    
    <div id="addBookForm" class="card shadow-sm mb-5" style="display: none;">
        <div class="card-body">
            <h5 class="card-title">Dodaj nową książkę</h5>
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="titleInput" class="form-control" placeholder="Tytuł książки" required>
                </div>
                <div class="col-md-5">
                    <input type="text" id="authorInput" class="form-control" placeholder="Autor" required>
                </div>
                <div class="col-md-2">
                    <button onclick="addBook()" class="btn btn-primary w-100">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Lista książek</h5>
            <ul id="booksContainer" class="list-group list-group-flush">
                <li class="list-group-item text-muted">Ładowanie...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://ekfjvbncqmoioxmfbrer.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrZmp2Ym5jcW1vaW94bWZicmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDA4NjQsImV4cCI6MjA5Mzk3Njg2NH0.JHSrgWWkenp8rg2di9TmvIp46XuOASWPs8Gx1rC52Zs';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    async function checkUser() {
        const { data: { user } } = await db.auth.getUser();
        const authArea = document.getElementById('authArea');
        const form = document.getElementById('addBookForm');
        
        if (user) {
            authArea.innerHTML = `
                <a href="search.html" class="btn btn-sm btn-outline-primary me-2">🔍 Szukaj znajomych</a>
                <a href="profile.html" class="btn btn-sm btn-info me-2 text-white">Mój Profil</a>
                <span class="me-2 text-dark"><strong>${user.email}</strong></span>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger">Wyloguj</button>
            `;
            form.style.display = 'block';
            return user;
        } else {
            authArea.innerHTML = `
                <a href="auth.html" class="btn btn-sm btn-success">Zaloguj się / Rejestracja</a>
            `;
            form.style.display = 'none';
            return null;
        }
    }

    async function logout() {
        await db.auth.signOut();
        window.location.reload();
    }

    async function fetchBooks() {
        const user = await checkUser();
        // Запрашиваем книги вместе с данными профиля автора
        const { data, error } = await db
            .from('books')
            .select(`*, profiles(username, avatar_url)`)
            .order('created_at', { ascending: false });

        const container = document.getElementById('booksContainer');
        container.innerHTML = ''; 

        if (error) { 
            container.innerHTML = '<li class="list-group-item text-danger">Błąd ładowania danych.</li>'; 
            return; 
        }
        
        data.forEach(book => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
            
            const deleteBtn = (user && user.id === book.user_id) ? `<button onclick="deleteBook(${book.id})" class="btn btn-sm btn-outline-danger">Usuń</button>` : '';

            // Если книга привязана к пользователю, показываем его аватарку и имя
            const authorName = book.profiles?.username || book.author;
            const authorAvatar = book.profiles?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            const profileLink = book.user_id ? `<a href="profile.html?id=${book.user_id}"><img src="${authorAvatar}" class="rounded-circle me-2" style="width: 30px; height: 30px; object-fit: cover;"> ${authorName}</a>` : authorName;

            li.innerHTML = `
                <div>
                    <strong>${book.title}</strong> 
                    <span class="text-muted ms-2">dodał: ${profileLink}</span>
                </div>
                <div>
                    <a href="details.html?id=${book.id}" class="btn btn-sm btn-outline-info me-2">Szczegóły</a>
                    ${deleteBtn}
                </div>
            `;
            container.appendChild(li);
        });
    }

    async function addBook() {
        const { data: { user } } = await db.auth.getUser();
        if (!user) return alert('Musisz być zalogowany!');

        const title = document.getElementById('titleInput').value.trim();
        const author = document.getElementById('authorInput').value.trim();
        
        // Привязываем книгу к текущему пользователю
        const { error } = await db.from('books').insert([{ 
            title, 
            author, 
            user_id: user.id 
        }]);

        if (!error) {
            document.getElementById('titleInput').value = '';
            document.getElementById('authorInput').value = '';
            fetchBooks();
        } else {
            alert('Błąd dodawania: ' + error.message);
        }
    }

    async function deleteBook(id) {
        if (!confirm('Na pewno chcesz usunąć?')) return;
        const { error } = await db.from('books').delete().eq('id', id);
        if (!error) fetchBooks();
    }

    fetchBooks();
</script>

</body>
</html>
